<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    background-image: url('./og.jpg');
    background-size: cover;
    background-position: center;
    font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", STSong, SimSun, serif;
    overflow: hidden;
  }
  /* 左侧暗色文字面板：盖住旧的焼き込み文字，并保证新文字可读；右侧渐隐露出占星盘主视觉 */
  .veil {
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      #080b1e 0%, #080b1e 34%,
      rgba(8,11,30,0.94) 48%,
      rgba(8,11,30,0.55) 62%,
      rgba(8,11,30,0.0) 76%);
  }
  /* 顶部/底部细微压暗，强化层次 */
  .vstripe {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(8,11,30,0.35) 0%, rgba(8,11,30,0) 22%, rgba(8,11,30,0) 78%, rgba(8,11,30,0.45) 100%);
  }
  .text {
    position: absolute;
    left: 96px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
  }
  .title {
    font-size: 150px;
    font-weight: 700;
    letter-spacing: 0.14em;
    line-height: 1;
    color: #f0cf7b;
    background: linear-gradient(180deg, #f7e6ad 0%, #e7be63 55%, #c79a44 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 22px rgba(214,168,76,0.45)) drop-shadow(0 2px 4px rgba(0,0,0,0.6));
  }
  .rule {
    width: 64px; height: 3px;
    margin: 40px 0 30px;
    background: linear-gradient(90deg, #e7be63, rgba(231,190,99,0.15));
    border-radius: 2px;
  }
  .tagline {
    font-size: 50px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #eed79a;
    text-shadow: 0 0 16px rgba(214,168,76,0.35), 0 2px 4px rgba(0,0,0,0.55);
  }
  .tagline .dot { color: #d6a84c; padding: 0 0.18em; }
  .sub {
    margin-top: 30px;
    font-size: 27px;
    letter-spacing: 0.04em;
    color: #aeb4d6;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .sub .sdot { color: #6b7099; padding: 0 0.35em; }
</style>
</head>
<body>
  <div class="card">
    <div class="veil"></div>
    <div class="vstripe"></div>
    <div class="text">
      <div class="title">千世书</div>
      <div class="rule"></div>
      <div class="tagline">一卷千世<span class="dot">·</span>活过千种人生</div>
      <div class="sub">AI 文字人生模拟器<span class="sdot">·</span>十大题材<span class="sdot">·</span>免 Key 即玩</div>
    </div>
  </div>
</body>
</html>
